/* ==================================================
   QUIZ VARIABLES
   ================================================== */

let selectedQuotes = [];
let currentQuestion = 0;
let correctAnswers = 0;

/* ==================================================
   START BUTTON
   ================================================== */

document
.getElementById("startBtn")
.addEventListener("click", startQuiz);

/* ==================================================
   SHUFFLE FUNCTION
   ================================================== */

function shuffle(array) {

    for (let i = array.length - 1; i > 0; i--) {

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
}

/* ==================================================
   START QUIZ
   ================================================== */

function startQuiz() {

    const errorBox = document.getElementById("homeError");
    errorBox.textContent = "";

    if (allQuotes.length < 10) {

        errorBox.textContent =
            `At least 10 quotes are required. Current quotes: ${allQuotes.length}`;

        return;
    }

    selectedQuotes =
        shuffle([...allQuotes]).slice(0, 10);

    currentQuestion = 0;
    correctAnswers = 0;

    document
        .getElementById("homePage")
        .classList.add("hidden");

    document
        .getElementById("resultsPage")
        .classList.add("hidden");

    document
        .getElementById("quizPage")
        .classList.remove("hidden");

    loadQuestion();
}

/* ==================================================
   LOAD QUESTION
   ================================================== */

function loadQuestion() {

    const question = selectedQuotes[currentQuestion];

    document.getElementById("questionCounter").textContent =
        `Question ${currentQuestion + 1} of 10`;

    document.getElementById("quoteText").textContent =
        `"${question.quote}"`;

    document.getElementById("answerResult").textContent = "";
    document.getElementById("sourceText").textContent = "";

    document.getElementById("answerButtons").style.display =
        "block";

    document.getElementById("nextBtn").classList.add("hidden");
}

/* ==================================================
   ANSWER QUESTION
   ================================================== */

function answerQuestion(choice) {

    const question = selectedQuotes[currentQuestion];

    const result =
        document.getElementById("answerResult");

    if (choice === question.category) {

        correctAnswers++;

        result.textContent = "CORRECT";
        result.className = "result correct";

    } else {

        result.textContent = "INCORRECT";
        result.className = "result incorrect";
    }

    document.getElementById("sourceText").textContent =
        `Source: ${question.source}`;

    document.getElementById("answerButtons").style.display =
        "none";

    const nextBtn =
        document.getElementById("nextBtn");

    nextBtn.classList.remove("hidden");

    if (currentQuestion === 9) {
        nextBtn.textContent = "See Results";
    } else {
        nextBtn.textContent = "Next Question";
    }
}

/* ==================================================
   NEXT QUESTION
   ================================================== */

function nextQuestion() {

    currentQuestion++;

    if (currentQuestion >= 10) {

        showResults();
        return;
    }

    loadQuestion();
}

   RESULTS PAGE
   ================================================== */
